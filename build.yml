name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK via EAS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Run Expo Doctor (warnings only)
        run: npx expo-doctor@latest || true
      - name: Build APK
        run: eas build --platform android --profile production --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Done
        run: echo "✅ Build started! Monitor at https://expo.dev"
